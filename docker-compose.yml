services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: packsight
      POSTGRES_PASSWORD: packsight
      POSTGRES_DB: packsight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
